apiVersion: apps/v1
kind: Deployment
metadata:
  name: emptydir-deployment
  labels:
    app: emptydir-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emptydir-app
  template:
    metadata:
      labels:
        app: emptydir-app
    spec:
      containers:
        - name: emptydir-container
          image: busybox
          command: ["sh", "-c", "echo Hello from the emptyDir volume! > /data/index.html && sleep 3600"]
          volumeMounts:
          - name: emptydir-volume
            mountPath: /data  
        - name: emptydir-container2
          image: busybox
          command: ["sh", "-c", "cat /usr/share/nginx/html/index.html && sleep 3600"] 
          volumeMounts:
            - name: emptydir-volume
              mountPath: /usr/share/nginx/html    
      volumes:
        - name: emptydir-volume 
          emptyDir: {}  

